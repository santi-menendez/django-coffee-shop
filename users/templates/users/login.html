{% extends "base.html" %}
{% load tailwind_filters %}
{% block content %}
<h2 class="text-2xl font-bold text-gray-900 sm:text-3xl">Iniciar Sesión</h2>
<form action="" method="post" class="mt-8 grid grid-cols-6 gap-6">
    {% csrf_token %}
    {{ form|crispy }}
    <button 
        class="inline-flex items-center justify-center rounded-full border border-indigo-600 bg-indigo-600 px-6 py-3 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-indigo-700 focus-visible:ring-4 focus-visible:ring-indigo-200 focus-visible:outline-none"
        type="submit">Iniciar Sesión
    </button>
</form> 
{% endblock content %}
